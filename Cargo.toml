# aip-rs — Cargo workspace.
#
# Architecture: per-feature crates re-exported by the umbrella `aip` crate.
# `prost-reflect` is a hard dependency only of the crates that reflect; the
# pure-syntax crates (`aip-resourcename`, `aip-resourceid`) stay proto-free.
# See docs/adr/0001-prost-reflect-and-workspace.md.

[workspace]
resolver = "2"
members = ["crates/*", "examples/*"]

[workspace.package]
version = "0.1.0"
edition = "2021"
# Declared + CI-enforced MSRV (issue #100). The hard floor is rustc 1.88 (tonic
# 0.14 / cel 0.13 demand it), but we track recent stable for language headroom;
# the `msrv` CI job pins exactly this toolchain. Bump deliberately, in step with
# the version pinned in `.github/workflows/ci.yml`.
rust-version = "1.95"
license = "MIT"
repository = "https://github.com/irate-walrus/aip-rs"
authors = ["irate-walrus"]

[workspace.dependencies]
# Internal crates (version + path so they can be published independently).
aip              = { version = "0.1.0", path = "crates/aip" }
# Standardized google.* protobuf types, generated by buf from the BSR (ADR-0011).
# The shared home for the schema the feature crates used to vendor per-crate.
aip-proto        = { version = "0.1.0", path = "crates/aip-proto" }
aip-resourcename = { version = "0.1.0", path = "crates/aip-resourcename" }
aip-resourceid   = { version = "0.1.0", path = "crates/aip-resourceid" }
# AIP-155 request_id validation + idempotency contract (issue #94). Pure
# string/UUID work, no protobuf dependency, like aip-resourceid.
aip-requestid    = { version = "0.1.0", path = "crates/aip-requestid" }
aip-pagination   = { version = "0.1.0", path = "crates/aip-pagination" }
aip-fieldmask    = { version = "0.1.0", path = "crates/aip-fieldmask" }
aip-ordering     = { version = "0.1.0", path = "crates/aip-ordering" }
aip-filtering    = { version = "0.1.0", path = "crates/aip-filtering" }
# IAM primitives (ADR-0010): Member/Role/Permission parsing + Policy structure.
# Opt-in via the umbrella's `iam` feature while the slice matures.
aip-iam          = { version = "0.1.0", path = "crates/aip-iam" }
aip-fieldbehavior = { version = "0.1.0", path = "crates/aip-fieldbehavior" }
# AIP-193 error-domain boundary layer (issue #145, ADR-0007): a tonic/tower
# `Layer` that rewrites the `aip-rs` sentinel domain in `grpc-status-details-bin`
# to the deploying service's own domain, set once at the serving boundary.
# Default-on via the umbrella's `errordomain` feature (behind `tonic`).
aip-errordomain  = { version = "0.1.0", path = "crates/aip-errordomain" }
# AIP-154 content etags (issue #93): a CRC32 content digest over a resource,
# excluding the etag field and OUTPUT_ONLY noise, plus the stale/malformed check.
# Default-on via the umbrella's `etag` feature; generalizes the IAM Policy etag.
aip-etag         = { version = "0.1.0", path = "crates/aip-etag" }
# AIP-164 soft delete / undelete state rules + the AIP-165 purge contract (issue
# #96): value-based (a State over delete_time presence), so no datastore or
# reflection dependency, like aip-requestid. Default-on via the umbrella's
# `softdelete` feature.
aip-softdelete   = { version = "0.1.0", path = "crates/aip-softdelete" }
# AIP-163 validate_only preview gate (issue #130): `commit_unless` names the gate
# the example owned as a local fn. Value-based (a bool decision over a commit
# closure), so no datastore or reflection dependency, like aip-requestid.
# Default-on via the umbrella's `preview` feature.
aip-preview      = { version = "0.1.0", path = "crates/aip-preview" }
# Field-violation accumulator (issue #60): collects per-field failures into one
# AIP-193 error. Default-on via the umbrella's `validation` feature.
aip-validation   = { version = "0.1.0", path = "crates/aip-validation" }
# Resource-annotation reflection (issue #61): ResourceType parsing, google.api
# resource descriptor iteration, and resource_reference validation. Default-on
# via the umbrella's `reflect` feature.
aip-reflect      = { version = "0.1.0", path = "crates/aip-reflect" }
# Optional SQL adapter (ADR-0005 / ADR-0008): transpiles the filter AST to a
# parameterized, dialect-rendered Predicate. Not part of the core; depended on
# directly by the example's default SQLite storage.
aip-sql          = { version = "0.1.0", path = "crates/aip-sql" }
# Resource-name code generator (issue #81, ADR-0011): the codegen-only helpers
# (MethodType / GrammaticalName / strcase) and `generate()`, which emits typed
# resource-name wrappers layered on `aip-resourcename`. Drives the
# `protoc-gen-prost-aip` buf/protoc plugin.
aip-codegen      = { version = "0.1.0", path = "crates/aip-codegen" }

# Test-only fixture harness (never published); dev-dependency of the reflective
# crates. Path-only — no version, since it is unpublishable.
test-fixtures    = { path = "crates/test-fixtures" }

# Protobuf runtime + reflection (reflective crates only).
prost         = "0.14"
prost-types   = "0.14"
prost-reflect = "0.16"
# Shared building blocks.
thiserror  = "2"
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
postcard   = "1"
base64     = "0.22"
crc32fast  = "1"
uuid       = { version = "1", features = ["v4"] }

# CEL parser + interpreter (the cel-rust project) for `aip-iam`'s opt-in `iam-eval`
# umbrella feature (forwarding to `aip-iam`'s `eval`) (ADR-0010): compile and
# evaluate an IAM **Condition** (general CEL, not the AIP-160 subset). Strictly
# behind the non-default `iam-eval` feature so
# parse/validate-only users never pull the parser/runtime. `chrono` rides with it
# because a CEL `request.time` value is a `chrono` timestamp (cel's default
# `chrono` feature), so a `std::time::SystemTime` is lowered through it.
cel   = "0.13"
chrono = { version = "0.4", default-features = false, features = ["std"] }

# Optional gRPC status mapping (behind each crate's `tonic` feature).
tonic = { version = "0.14", default-features = false }
# AIP-193 standard error details (BadRequest / ErrorInfo) packed into a mapped
# `tonic::Status`. Pulled in alongside `tonic` by each crate's `tonic` feature.
tonic-types = { version = "0.14", default-features = false }

# The tower/http building blocks the `aip-errordomain` boundary layer is built
# from (issue #145): the `Layer`/`Service` traits, the `http` types its
# `grpc-status-details-bin` header lives in, the `http_body` trait its wrapped
# response body re-publishes trailers through, and `Bytes` (the body data type
# tonic's server stack carries) / `base64` (the status header codec) /
# `pin-project-lite` (response future + body wrapper projection).
tower = { version = "0.5", default-features = false }
http = "1"
http-body = "1"
# Collects a response body to drain its trailers — the freight smoke test reads
# the rewritten `grpc-status-details-bin` off a through-the-stack gRPC response.
http-body-util = "0.1"
bytes = "1"
pin-project-lite = "0.2"

# Example gRPC server only (`examples/freight-server`) — never used by the core
# crates. `tonic-prost` supplies the runtime Prost codec the buf-generated
# services use (ADR-0011); the generated code is committed, so there is no
# build-time codegen dependency. See examples/freight-server.
tonic-prost       = "0.14"
# gRPC server reflection for the example server: feeds the embedded
# FileDescriptorSet to grpcurl / grpc-go clients so `-import-path`/`-proto`
# flags are not needed (issue #91).
tonic-reflection  = "0.14"
tokio             = { version = "1", features = ["rt-multi-thread", "macros", "signal"] }
# Real SQLite engine for the example's default Site storage, proving an AIP filter
# travels end-to-end into a database (ADR-0008). `bundled` compiles a vendored
# SQLite, so no system library is required (a C toolchain is). Example-only.
rusqlite          = { version = "0.37", features = ["bundled"] }
