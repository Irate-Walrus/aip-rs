# Release management (issue #100). PAUSED while the API stabilises in 0.0.x —
# everything stays at 0.0.1, no automatic version bumps or releases. The trigger
# below is `workflow_dispatch` only, so this never runs on push. Re-enable by
# restoring the `push: branches: [main]` trigger (see the commented block).
#
# When live (GIT-ONLY mode), two halves run on push to `main`:
#
#   * release-pr — opens/refreshes a "release" PR carrying the version bumps and
#     changelog entries for everything that changed since the last release.
#   * release   — after that PR merges (the bump lands on `main`), cuts a GitHub
#     release + git tag per crate (which feeds `release-plugin-binaries.yml`). It
#     does NOT publish to crates.io: `release-plz.toml` sets `publish = false`
#     because the `aip` / `aip-filtering` names are owned by others there. See
#     that file for how to turn crates.io publishing on.
#
# Repo secrets (when live):
#   * CARGO_REGISTRY_TOKEN — unused while `publish = false`; wired and ready for
#     when crates.io publishing is enabled.
#   * RELEASE_PLZ_TOKEN    — optional PAT or GitHub App token. Use one if you want
#     the release PR to trigger the other CI workflows, and (crucially) if you
#     want the GitHub release that `release` creates to fire the
#     `release-plugin-binaries` workflow: releases created with the default
#     GITHUB_TOKEN do not trigger further workflows. Falls back to GITHUB_TOKEN.
name: release-plz

on:
  # PAUSED: manual-only while stabilising in 0.0.x. To re-enable automatic
  # releasing, uncomment the `push` trigger below.
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  contents: write
  pull-requests: write

# Never run two release jobs against `main` at once: serialize, and do NOT cancel
# a publish midway.
concurrency:
  group: release-plz
  cancel-in-progress: false

jobs:
  # Keep the release PR (version bumps + changelogs) up to date with `main`.
  release-pr:
    name: release-pr
    runs-on: ubuntu-latest
    # Skip on forks: the secrets are not present there.
    if: github.repository_owner == 'Irate-Walrus'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      # No cargo-semver-checks install: `semver_check = false` while git-only
      # (the crates.io baselines for our two colliding names are third-party
      # crates). Re-add it when crates.io publishing is turned on.
      - uses: Swatinem/rust-cache@v2
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Publish whatever the merged release PR bumped (no-op on ordinary pushes).
  release:
    name: release
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Irate-Walrus'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
