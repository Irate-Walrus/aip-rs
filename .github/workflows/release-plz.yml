# Publish automation (issue #100). Two halves, both on push to `main`:
#
#   * release-pr — opens/refreshes a "release" PR carrying the version bumps and
#     changelog entries for everything that changed since the last release. It
#     runs cargo-semver-checks, so a breaking change without the matching bump is
#     caught here, in CI.
#   * release   — after that PR merges (the bump lands on `main`), publishes the
#     changed crates to crates.io in dependency order and cuts a GitHub release +
#     tag per crate.
#
# Required repo secrets:
#   * CARGO_REGISTRY_TOKEN — a crates.io token, for publishing.
#   * RELEASE_PLZ_TOKEN    — optional PAT or GitHub App token. Use one if you want
#     the release PR to trigger the other CI workflows, and (crucially) if you
#     want the GitHub release that `release` creates to fire the
#     `release-plugin-binaries` workflow: releases created with the default
#     GITHUB_TOKEN do not trigger further workflows. Falls back to GITHUB_TOKEN.
name: release-plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Never run two release jobs against `main` at once: serialize, and do NOT cancel
# a publish midway.
concurrency:
  group: release-plz
  cancel-in-progress: false

jobs:
  # Keep the release PR (version bumps + changelogs) up to date with `main`.
  release-pr:
    name: release-pr
    runs-on: ubuntu-latest
    # Skip on forks: the secrets are not present there.
    if: github.repository_owner == 'Irate-Walrus'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      # release-plz runs cargo-semver-checks when the binary is on PATH.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks
      - uses: Swatinem/rust-cache@v2
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Publish whatever the merged release PR bumped (no-op on ordinary pushes).
  release:
    name: release
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Irate-Walrus'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
