# freight-server ‚Äî runnable demo of aip-rs.
#
# A tonic gRPC server implementing einride's example `FreightService`
# (Shipper / Site / Shipment) over an in-memory store. It exists to exercise the
# aip-rs primitives end-to-end and to give us something real to test against; it
# grows as the per-feature crates land (see the per-handler `TODO(aip #N)` seams
# in `src/service.rs`).
#
# The proto types are generated by `buf generate` and committed under `src/gen`
# (ADR-0011), so building the example needs no proto toolchain; `regen.sh` is
# the maintainer path. The crate owns only its `einride.example.freight.v1`
# service protos under `proto/` ‚Äî every shared `google.*` type comes from
# `aip-proto`, googleapis itself riding as a digest-pinned BSR dependency.
[package]
name = "freight-server"
description = "Runnable tonic gRPC demo of aip-rs over einride's example FreightService"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish = false

[dependencies]
# The SDK under demonstration. Handlers wire in each module as its issue lands.
# The `tonic` feature turns on the crates' AIP-193 `From<Error> for tonic::Status`
# mapping (#16), so a primitive's validation error reaches the client as a rich
# `INVALID_ARGUMENT` (ErrorInfo + BadRequest) via `?`. The `iam` feature exposes
# `aip::iam` for the `IAMPolicy` service's Member validation; `iam-proto` adds the
# generated `google.iam.v1.Policy` / `Binding` structure and the structural
# read-modify-write ops (binding add/remove, dedupe, the `etag` cycle, the
# version-3 invariant). The demo still generates its own `IAMPolicy` *service*
# trait + request types, but `build.rs` `extern_path`s the `google.iam.v1` *message*
# layer onto `aip::iam::proto`, so the service shares one `Policy` type with the
# helpers it calls (aip #65) instead of a structurally-identical duplicate. The
# `eval` feature exposes `aip::iam::eval` ‚Äî the CEL-backed Condition evaluation
# adapter (aip #66) ‚Äî which `TestIamPermissions` will decide *through* (aip #68);
# enabling it here keeps the demo compile-tracking the library feature.
aip = { workspace = true, features = ["tonic", "sql", "iam", "iam-proto", "eval"] }

# The shared `google.*` types the generated code references by `extern_path`
# (ADR-0011): `google.iam.v1` (the one `Policy` the IAMPolicy service and the
# `aip::iam` helpers share ‚Äî `iam` implies `type`, which carries the Site's
# `google.type.LatLng`).
aip-proto = { workspace = true, features = ["iam"] }
# The runtime `Pattern` engine behind the generated typed resource-name wrappers
# (`ShipperResourceName`, ‚Ä¶): their `parse`/`format` run on this crate.
aip-resourcename = { workspace = true }

# gRPC runtime: tonic core (server + transport), the Prost codec the generated
# service uses, and the protobuf message runtime. `tonic-types` lets the handlers
# attach the same AIP-193 details to their own presence checks (e.g. a required
# field), which no aip-rs primitive covers.
tonic            = { workspace = true, features = ["server", "transport", "router", "codegen"] }
tonic-types      = { workspace = true }
tonic-prost      = { workspace = true }
# gRPC server reflection (issue #91): serves the embedded FileDescriptorSet so
# grpcurl works without `-import-path`/`-proto` flags.
tonic-reflection = { workspace = true }
prost       = { workspace = true }
prost-types = { workspace = true }
# Reflection (ADR-0001 / ADR-0009): the `derive` feature emits the
# `ReflectMessage` impls that make the generated freight types Typed messages ‚Äî
# each carrying its own descriptor ‚Äî and supplies the `DescriptorPool` +
# `DynamicMessage` transcode bridge the reflective `aip::pagination` /
# `aip::fieldmask` primitives still read through in this slice.
prost-reflect = { workspace = true, features = ["derive"] }
tokio       = { workspace = true }

# Default SQLite-backed Site storage (ADR-0008): the `aip` umbrella's `sql`
# feature (above) re-exports the SQL adapter as `aip::sql`, which transpiles the
# AIP filter to a parameterized Predicate; `rusqlite` (bundled SQLite, opened
# in-memory) binds the values and runs it. This is the Site store out of the box,
# so `cargo run` exercises the filter end-to-end; shippers stay in an in-memory
# map. The `bundled` SQLite needs a C toolchain to build the example.
rusqlite = { workspace = true }
# The `annotations` map / `tags` list are stored as JSON text so the has operator
# can query them with SQLite's `json_each` (#41).
serde_json = { workspace = true }
