# buf generate template for the freight example (ADR-0011).
#
# Three plugins, all emitting into the committed `src/gen`:
#
#   * neoeinstein-prost — the `einride.example.freight.v1` message structs. The
#     shared `google.*` packages are NOT generated here: `extern_path` maps them
#     onto `aip-proto`'s committed types, so e.g. `google.iam.v1.Policy` exists
#     once in the workspace by construction (the eight per-message extern_path
#     mappings the old `build.rs` hand-maintained disappear with it).
#   * neoeinstein-tonic — the `FreightService` server trait, plus (via the
#     `proto/imports.proto` anchor and `regen.sh`'s `--include-imports`) the
#     `google.iam.v1.IAMPolicy` service trait whose request/response messages
#     come from `aip-proto`.
#   * protoc-gen-prost-aip — the typed resource-name wrappers
#     (`ShipperResourceName`, …) generated from each `google.api.resource`
#     annotation (the protoc-gen-go-aip analog), built from this workspace, plus
#     the `prost_reflect::ReflectMessage` impls (see below).
#
# Reflection wiring (ADR-0009) is emitted by protoc-gen-prost-aip: with
# `reflect=true` it writes an `impl ReflectMessage` for every generated message,
# resolving each one's descriptor from `reflect_descriptor_pool` at runtime. This
# replaces the old per-message `#[prost_reflect(message_name = "…")]` type
# attributes the prost derive required — the plugin already knows every message's
# fully-qualified name, so the list is no longer hand-maintained (issue #191).
#
# The plugins are version-pinned for the same reason buf.lock digest-pins the
# schema: regen.sh's reproducibility claim (and ADR-0011's CI drift check) holds
# only if both halves of the generation are pinned.
version: v2
plugins:
  - remote: buf.build/community/neoeinstein-prost:v0.5.0
    out: src/gen
    opt:
      # Keep this extern_path block identical to the neoeinstein-tonic one
      # below: a package mapped in only one of the two leaves the other plugin
      # referencing a crate-local module that is never emitted.
      #
      # `.google.rpc` maps onto tonic-types only to *suppress* generation of the
      # error_details closure the anchor imports (the types ride in the
      # descriptor set for grpcurl, never as fields of a freight message);
      # tonic-types' root re-exports happen to be the right paths today, but
      # nothing generated actually references them.
      - extern_path=.google.api=::aip_proto::google::api
      - extern_path=.google.rpc=::tonic_types
      - extern_path=.google.iam.v1=::aip_proto::google::iam::v1
      - extern_path=.google.type=::aip_proto::google::type
  - remote: buf.build/community/neoeinstein-tonic:v0.5.0
    out: src/gen
    # The only plugin that needs imports: the `google.iam.v1.IAMPolicy` service
    # trait comes from an imported file (via the `proto/imports.proto` anchor).
    # prost and protoc-gen-prost-aip generate for the freight target protos only.
    include_imports: true
    opt:
      # Server-only, as before: we implement the services, we don't call them.
      - no_client=true
      # Skip the insertion-point include the plugin would otherwise splice into
      # each prost-generated file (google.iam.v1's is a deleted placeholder —
      # its messages live in aip-proto); src/proto.rs mounts every .tonic.rs
      # explicitly instead.
      - no_include=true
      # Keep identical to the neoeinstein-prost extern_path block above.
      - extern_path=.google.api=::aip_proto::google::api
      - extern_path=.google.rpc=::tonic_types
      - extern_path=.google.iam.v1=::aip_proto::google::iam::v1
      - extern_path=.google.type=::aip_proto::google::type
  # The workspace's own AIP plugin (ADR-0011), run from source so the generated
  # code always matches the checked-out generator.
  - local: ["cargo", "run", "--quiet", "--package", "protoc-gen-prost-aip"]
    out: src/gen
    # Generate only for the freight target protos, NOT the extern_path'd imports
    # (the default, made explicit): `reflect=true` would otherwise emit
    # `impl ReflectMessage` for the `google.*` messages, whose structs live in
    # `aip-proto` (extern), not here.
    include_imports: false
    opt:
      # Opt in to the field-shape-keyed `PageRequest` impls (ADR-0013): every
      # request with `page_token` + `page_size` — the three freight List
      # requests — gets the impl generated instead of hand-written.
      - pagination=true
      # Opt in to the `OrderByRequest` impls (ADR-0013): every request with
      # `order_by` — `ListSitesRequest` alone — gets the impl generated instead
      # of hand-written.
      - ordering=true
      # Opt in to the resource-anchored `SoftDeletable` impls (ADR-0014): every
      # `google.api.resource` message carrying a `delete_time` — Shipper, Site,
      # Shipment — gets the impl generated, so a handler passes the resource
      # straight to `aip::softdelete::check_visible` instead of spelling out
      # `State::from_deleted(resource.delete_time.is_some())`.
      - softdelete=true
      # Route all generated crate references through the `aip` umbrella crate
      # (issue #138): `::aip::pagination::PageRequest` instead of
      # `::aip_pagination::PageRequest`, etc. Removes the need for direct deps
      # on `aip-pagination`, `aip-ordering`, `aip-resourcename` in Cargo.toml.
      - aip_crate=aip
      # Emit `impl ::prost_reflect::ReflectMessage` for every generated message
      # (ADR-0009, issue #191), resolving each descriptor from the crate's pool —
      # replacing the per-message `message_name` type attributes the prost derive
      # used to require. `aip_crate` does not route this: `prost_reflect` is a
      # third-party crate the example depends on directly.
      - reflect=true
      - reflect_descriptor_pool=crate::proto::DESCRIPTOR_POOL
