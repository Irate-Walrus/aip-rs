[package]
name = "aip-proto"
description = "Standardized google.* protobuf types, generated by buf from the BSR (ADR-0011)"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]
# The descriptor pool is always present (it backs reflection and carries the
# extension definitions), so `prost-reflect` is a hard dependency. The `derive`
# feature supplies the `ReflectMessage` derive the generated code carries
# (ADR-0009); reflection wiring lives in the committed code, not a build.rs.
prost-reflect = { workspace = true, features = ["derive"] }
# The generated message structs use `::prost` (`Message`) and, for the CEL types,
# `::prost_types` (the well-known types neoeinstein-prost extern-maps). Both are
# pulled only when a generating feature is on, so a no-feature build is just the
# pool.
prost = { workspace = true, optional = true }
prost-types = { workspace = true, optional = true }

[features]
# Off by default so a consumer compiles only the `google.*` packages it uses
# (ADR-0011): an IAM-only user does not compile the CEL types. The shared
# `DESCRIPTOR_POOL` is import-complete regardless, so extension annotations stay
# readable even with no package feature enabled.
default = []

# google.api.* annotation types (ResourceDescriptor / ResourceReference, the
# field_behavior / launch_stage enums, and the http/client-library option types
# iam_policy.proto's closure pulls in).
api = ["dep:prost", "dep:prost-types"]
# google.type.* shared types (Expr, LatLng).
type = ["dep:prost", "dep:prost-types"]
# google.iam.v1.* Policy structure (ADR-0010) plus the IAMPolicy service's
# request/response messages, so a service crate generating the IAMPolicy trait
# shares one Policy type. Implies `type`: a Binding's condition is a
# `google.type.Expr`, and the generated code references it by path.
iam = ["type", "dep:prost", "dep:prost-types"]
# CEL google.api.expr.v1alpha1 checked/abstract syntax trees.
cel = ["dep:prost", "dep:prost-types"]
