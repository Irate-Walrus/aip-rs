# buf generate template for aip-proto (ADR-0011).
#
# neoeinstein-prost emits the prost structs. Reflection wiring (ADR-0009) is added
# as prost type attributes rather than a build.rs: every message derives
# `prost_reflect::ReflectMessage` against the crate-local `DESCRIPTOR_POOL`, and
# each one is given its fully-qualified `message_name` (the derive requires it
# explicitly — it does not infer it from the prost path).
#
# The `message_name` lines below enumerate every generated message. They are the
# one hand-maintained part of this file, but completeness is compiler-enforced: a
# message left without its `message_name` fails to derive `ReflectMessage`
# ("missing required argument 'message_name'"), so a googleapis digest bump that
# adds messages breaks the build loudly rather than drifting silently. Regenerate
# the list after a digest bump (from this directory):
#
#   ../../scripts/buf-message-names.py --skip aip.proto
#
# Comments are disabled: the googleapis docs carry ```-fenced JSON/CEL examples
# that rustdoc would otherwise run as doctests (matches aip-iam / aip-filtering).
#
# The plugin is version-pinned for the same reason buf.lock digest-pins the
# schema: regen.sh's reproducibility claim (and ADR-0011's CI drift check) holds
# only if both halves of the generation are pinned.
version: v2
plugins:
  - remote: buf.build/community/neoeinstein-prost:v0.5.0
    out: src/gen
    opt:
      - disable_comments=.
      - 'type_attribute=.=#[derive(::prost_reflect::ReflectMessage)]'
      - 'type_attribute=.=#[prost_reflect(descriptor_pool = "crate::DESCRIPTOR_POOL")]'
      - 'type_attribute=google.api.BatchingConfigProto=#[prost_reflect(message_name = "google.api.BatchingConfigProto")]'
      - 'type_attribute=google.api.BatchingDescriptorProto=#[prost_reflect(message_name = "google.api.BatchingDescriptorProto")]'
      - 'type_attribute=google.api.BatchingSettingsProto=#[prost_reflect(message_name = "google.api.BatchingSettingsProto")]'
      - 'type_attribute=google.api.ClientLibrarySettings=#[prost_reflect(message_name = "google.api.ClientLibrarySettings")]'
      - 'type_attribute=google.api.CommonLanguageSettings=#[prost_reflect(message_name = "google.api.CommonLanguageSettings")]'
      - 'type_attribute=google.api.CppSettings=#[prost_reflect(message_name = "google.api.CppSettings")]'
      - 'type_attribute=google.api.CustomHttpPattern=#[prost_reflect(message_name = "google.api.CustomHttpPattern")]'
      - 'type_attribute=google.api.DotnetSettings=#[prost_reflect(message_name = "google.api.DotnetSettings")]'
      - 'type_attribute=google.api.GoSettings=#[prost_reflect(message_name = "google.api.GoSettings")]'
      - 'type_attribute=google.api.Http=#[prost_reflect(message_name = "google.api.Http")]'
      - 'type_attribute=google.api.HttpRule=#[prost_reflect(message_name = "google.api.HttpRule")]'
      - 'type_attribute=google.api.JavaSettings=#[prost_reflect(message_name = "google.api.JavaSettings")]'
      - 'type_attribute=google.api.MethodSettings=#[prost_reflect(message_name = "google.api.MethodSettings")]'
      - 'type_attribute=google.api.MethodSettings.LongRunning=#[prost_reflect(message_name = "google.api.MethodSettings.LongRunning")]'
      - 'type_attribute=google.api.NodeSettings=#[prost_reflect(message_name = "google.api.NodeSettings")]'
      - 'type_attribute=google.api.PhpSettings=#[prost_reflect(message_name = "google.api.PhpSettings")]'
      - 'type_attribute=google.api.Publishing=#[prost_reflect(message_name = "google.api.Publishing")]'
      - 'type_attribute=google.api.PythonSettings=#[prost_reflect(message_name = "google.api.PythonSettings")]'
      - 'type_attribute=google.api.PythonSettings.ExperimentalFeatures=#[prost_reflect(message_name = "google.api.PythonSettings.ExperimentalFeatures")]'
      - 'type_attribute=google.api.ResourceDescriptor=#[prost_reflect(message_name = "google.api.ResourceDescriptor")]'
