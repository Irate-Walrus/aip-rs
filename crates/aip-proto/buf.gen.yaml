# buf generate template for aip-proto (ADR-0011).
#
# Two plugins, both emitting into the committed `src/gen`:
#
#   * neoeinstein-prost — the prost structs for the vendored `google.*` packages.
#   * protoc-gen-prost-aip — the workspace's own plugin (run from source), here
#     only for its `reflect=true` emission.
#
# Reflection wiring (ADR-0009) is emitted by protoc-gen-prost-aip: with
# `reflect=true` it writes an `impl ::prost_reflect::ReflectMessage` for every
# generated message (nested included), resolving each one's descriptor from
# `crate::DESCRIPTOR_POOL` at runtime. This replaces the old per-message
# `#[prost_reflect(message_name = "…")]` type attributes the prost derive
# required — the plugin already knows every message's fully-qualified name, so
# the list is no longer hand-maintained (issue #191). Completeness stays
# compiler-enforced the same way: a missing or mis-named impl is a build error,
# not silent drift.
#
# Comments are disabled: the googleapis docs carry ```-fenced JSON/CEL examples
# that rustdoc would otherwise run as doctests (matches aip-iam / aip-filtering).
#
# The remote plugin is version-pinned for the same reason buf.lock digest-pins
# the schema: regen.sh's reproducibility claim (and ADR-0011's CI drift check)
# holds only if both halves are pinned. The local plugin is run from source, so
# it always matches the checked-out generator.
version: v2
plugins:
  - remote: buf.build/community/neoeinstein-prost:v0.5.0
    out: src/gen
    opt:
      - disable_comments=.
      # google.longrunning.Operation.error is a google.rpc.Status. Map google.rpc
      # onto tonic-types — the one Status the AIP-193 error stack already uses
      # (ADR-0007/0011) — so no second Status struct is generated here.
      # neoeinstein-prost then emits nothing for google.rpc; only the aip plugin
      # below would (a ReflectMessage orphan for the extern'd Status), which
      # regen.sh drops.
      - extern_path=.google.rpc=::tonic_types
  # The workspace's own AIP plugin (ADR-0011), run from source. aip-proto owns
  # the `google.*` types, so this follows regen.sh's `--include-imports` and
  # reflects every generated message (the `aip.proto` import anchor has none).
  - local: ["cargo", "run", "--quiet", "--package", "protoc-gen-prost-aip"]
    out: src/gen
    opt:
      # Emit `impl ::prost_reflect::ReflectMessage` for every generated message
      # (ADR-0009, issue #191), resolving each descriptor from the crate pool.
      - reflect=true
      - reflect_descriptor_pool=crate::DESCRIPTOR_POOL
